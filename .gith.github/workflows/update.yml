name: Actualizar señales IOS

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repo
        uses: actions/checkout@v4

      - name: Preparar Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Jalar datos y calcular señales
        env:
          FRED_KEY: ${{ secrets.FRED_KEY }}
          BANXICO_TOKEN: ${{ secrets.BANXICO_TOKEN }}
        run: node fetch-data.js

      - name: Guardar los datos actualizados
        run: |
          git config user.name "ios-bot"
          git config user.email "ios-bot@users.noreply.github.com"
          git add data.js data.json
          if git diff --staged --quiet; then
            echo "Sin cambios en esta corrida."
          else
            git commit -m "Actualiza señales ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi
